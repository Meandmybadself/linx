_metadata:
  major_version: 1
  minor_version: 1

display_information:
  name: MNNCRPLS Linx
  description: Collects links shared by opted-in users and publishes them to a website.
  background_color: "#7c6ff7"
  long_description: |
    MNNCRPLS Linx watches channels it's invited to and collects links shared
    by users who have opted in via /linx-optin. Links are published hourly to
    mnncrpls.meandmybadself.com. Users can opt out at any time with /linx-optout.

features:
  bot_user:
    display_name: MNNCRPLS Linx
    always_online: false
  slash_commands:
    - command: /linx-optin
      url: https://YOUR_WORKER_SUBDOMAIN.workers.dev/slack/commands
      description: Opt in to have your shared links collected
      usage_hint: ""
      should_escape: false
    - command: /linx-optout
      url: https://YOUR_WORKER_SUBDOMAIN.workers.dev/slack/commands
      description: Opt out of link collection
      usage_hint: ""
      should_escape: false

oauth_config:
  scopes:
    bot:
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - commands
      - users:read

settings:
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
